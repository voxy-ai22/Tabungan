<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="coin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff8c00;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="jar" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00cc6a;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)" rx="80"/>
  
  <!-- Decorative dots pattern -->
  <circle cx="60" cy="60" r="4" fill="#ffffff" opacity="0.1"/>
  <circle cx="100" cy="40" r="3" fill="#ffffff" opacity="0.08"/>
  <circle cx="40" cy="100" r="3" fill="#ffffff" opacity="0.08"/>
  <circle cx="450" cy="80" r="4" fill="#ffffff" opacity="0.1"/>
  <circle cx="470" cy="120" r="3" fill="#ffffff" opacity="0.08"/>
  <circle cx="420" cy="450" r="4" fill="#ffffff" opacity="0.1"/>
  <circle cx="80" cy="430" r="3" fill="#ffffff" opacity="0.08"/>
  
  <!-- Jar body -->
  <rect x="140" y="220" width="232" height="200" rx="30" fill="#0f3460" stroke="#00ff88" stroke-width="4"/>
  
  <!-- Jar top (neck) -->
  <rect x="160" y="190" width="192" height="45" rx="15" fill="#0f3460" stroke="#00ff88" stroke-width="4"/>
  
  <!-- Jar lid -->
  <rect x="148" y="168" width="216" height="32" rx="10" fill="url(#jar)" opacity="0.9"/>
  
  <!-- Jar slot (coin hole) -->
  <rect x="226" y="172" width="60" height="12" rx="6" fill="#1a1a2e"/>
  
  <!-- Jar shine/reflection -->
  <rect x="165" y="235" width="40" height="160" rx="8" fill="#ffffff" opacity="0.06"/>
  <rect x="175" y="240" width="12" height="140" rx="4" fill="#ffffff" opacity="0.08"/>
  
  <!-- Coins inside jar -->
  <ellipse cx="256" cy="360" rx="60" ry="18" fill="url(#coin)" opacity="0.9"/>
  <ellipse cx="256" cy="346" rx="60" ry="18" fill="url(#coin)" opacity="0.85"/>
  <ellipse cx="256" cy="332" rx="60" ry="18" fill="url(#coin)" opacity="0.8"/>
  <ellipse cx="256" cy="318" rx="60" ry="18" fill="url(#coin)" opacity="0.75"/>
  
  <!-- Coin shine -->
  <ellipse cx="250" cy="316" rx="20" ry="6" fill="#ffffff" opacity="0.3"/>
  
  <!-- Floating coin above jar -->
  <ellipse cx="256" cy="128" rx="42" ry="14" fill="url(#coin)" filter="url(#glow)"/>
  <ellipse cx="256" cy="116" rx="42" ry="14" fill="url(#coin)"/>
  <text x="256" y="122" text-anchor="middle" dominant-baseline="middle" font-family="Arial Black, sans-serif" font-size="18" font-weight="900" fill="#1a1a2e">Rp</text>
  
  <!-- Sparkles -->
  <g fill="#ffd700" filter="url(#glow)">
    <polygon points="100,130 105,148 123,148 109,158 114,176 100,166 86,176 91,158 77,148 95,148" opacity="0.8" transform="scale(0.6) translate(70,60)"/>
    <polygon points="380,160 384,172 396,172 387,179 391,191 380,184 369,191 373,179 364,172 376,172" opacity="0.7" transform="scale(0.7) translate(120,20)"/>
  </g>
  
  <!-- Bottom text -->
  <text x="256" y="460" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="28" font-weight="900" fill="#00ff88" letter-spacing="3">CELENGAN</text>
</svg>